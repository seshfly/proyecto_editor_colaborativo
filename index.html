<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor colaborativo de poesía </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0f1a 50%, #0a0a1a 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .editor-card {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #e8dcc0;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            letter-spacing: 2px;
        }

        .sub {
            text-align: center;
            color: #a09070;
            margin-bottom: 1.5rem;
            font-style: italic;
            font-size: 0.8rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d, #ffd4a8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .user-name {
            color: #e8dcc0;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .online-users {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4aff4a;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .online-count {
            color: #a09070;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .tool-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: rgba(30, 25, 50, 0.8);
            border: 1px solid rgba(232, 220, 192, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #e8dcc0;
            font-family: monospace;
            font-size: 0.7rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .tool-btn:hover {
            background: rgba(50, 45, 80, 0.9);
            transform: translateY(-2px);
        }

        .editor-area {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .editor-panel {
            flex: 2;
            min-width: 300px;
        }

        .stats-panel {
            flex: 1;
            min-width: 200px;
            background: rgba(10, 8, 20, 0.5);
            border-radius: 1rem;
            padding: 1rem;
        }

        .editor-label {
            color: #a09070;
            font-size: 0.7rem;
            font-family: monospace;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .poem-editor {
            width: 100%;
            min-height: 450px;
            background: rgba(10, 8, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            padding: 1.2rem;
            color: #e8dcc0;
            font-family: 'Georgia', 'Times New Roman', monospace;
            font-size: 1rem;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.2s;
        }

        .poem-editor:focus {
            outline: none;
            border-color: #ffd4a8;
            box-shadow: 0 0 15px rgba(255, 212, 168, 0.2);
        }

        .stats-title {
            color: #a09070;
            font-size: 0.7rem;
            font-family: monospace;
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 1px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            color: #8a7a9a;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .stat-value {
            color: #ffd4a8;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .theme-selector {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .theme-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .theme-color:hover {
            transform: scale(1.1);
        }

        .theme-color.active {
            border-color: #ffd4a8;
            box-shadow: 0 0 8px #ffd4a8;
        }

        .collaborators {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .collaborators-title {
            color: #a09070;
            font-size: 0.7rem;
            font-family: monospace;
            margin-bottom: 0.5rem;
        }

        .collaborators-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .collaborator-badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #dcd6ff;
            background: rgba(64, 51, 104, 0.6);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-family: monospace;
        }

        .collaborator-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .remote-cursor {
            position: absolute;
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: currentColor;
            animation: blink 1s infinite;
            pointer-events: none;
            z-index: 100;
        }

        .remote-cursor-label {
            position: absolute;
            top: -18px;
            left: 0;
            background: currentColor;
            color: #1a1630;
            padding: 0 4px;
            border-radius: 4px;
            font-size: 9px;
            font-family: monospace;
            white-space: nowrap;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffd4a8;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            z-index: 10000;
            border: 1px solid #ffd4a8;
            animation: toastFade 2s ease forwards;
        }

        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .editor-card {
                padding: 1rem;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor-card">
            <h1>Editor colaborativo de poesía</h1>
            <p class="sub">Escribe en tiempo real. Abre otra pestaña para ver la colaboración.</p>

            <div class="toolbar">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">📝</div>
                    <div class="user-name" id="userName">Poeta_1</div>
                    <div class="online-users">
                        <div class="online-dot"></div>
                        <div class="online-count" id="onlineCount">1 conectado</div>
                    </div>
                </div>
                <div class="tool-buttons">
                    <button class="tool-btn" id="undoBtn">Deshacer</button>
                    <button class="tool-btn" id="redoBtn">Rehacer</button>
                    <button class="tool-btn" id="exportTxtBtn">Exportar TXT</button>
                    <button class="tool-btn" id="exportJsonBtn">Exportar JSON</button>
                    <button class="tool-btn" id="clearBtn">Limpiar</button>
                </div>
            </div>

            <!-- Área de edición -->
            <div class="editor-area">
                <div class="editor-panel">
                    <div class="editor-label">
                        <span>Tu poema</span>
                        <span id="lastSaved">Guardando...</span>
                    </div>
                    <textarea id="poemEditor" class="poem-editor" placeholder="Escribe tu poema aquí...&#10;&#10;La luna me sonríe,&#10;el viento me abraza,&#10;y en cada palabra que escribo,&#10;un verso nuevo nace."></textarea>
                </div>
                <div class="stats-panel">
                    <div class="stats-title">Estadísticas del poema</div>
                    <div class="stat-item">
                        <span class="stat-label">Versos</span>
                        <span class="stat-value" id="linesCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Palabras</span>
                        <span class="stat-value" id="wordsCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Caracteres</span>
                        <span class="stat-value" id="charsCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Sílabas (aprox)</span>
                        <span class="stat-value" id="syllablesCount">0</span>
                    </div>

                    <div class="theme-selector">
                        <div class="stats-title">Tema del editor</div>
                        <div class="theme-buttons" id="themeButtons">
                            <div class="theme-color" data-theme="dark" style="background: #1a1630;"></div>
                            <div class="theme-color" data-theme="sepia" style="background: #f4ecd8;"></div>
                            <div class="theme-color" data-theme="forest" style="background: #1a3a2a;"></div>
                            <div class="theme-color" data-theme="ocean" style="background: #1a2a4a;"></div>
                        </div>
                    </div>

                    <div class="collaborators">
                        <div class="collaborators-title">Colaboradores activos</div>
                        <div class="collaborators-list" id="collaboratorsList">
                            <div class="collaborator-badge" style="border-left: 3px solid #ffd4a8;">
                                <span>📝 Tú</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userId = 'user_' + Math.random().toString(36).substr(2, 6);
        const colors = ['#ff6b9d', '#6b9dff', '#6bff9d', '#ffd700', '#ff9d6b', '#9d6bff'];
        const userColor = colors[Math.floor(Math.random() * colors.length)];
        const userNames = ['Poeta_Alado', 'Verso_Libre', 'Rima_Profunda', 'Letra_Errante', 'Sueño_Escrito', 'Tinta_Nocturna'];
        const userName = userNames[Math.floor(Math.random() * userNames.length)];

        const editor = document.getElementById('poemEditor');
        const linesCountSpan = document.getElementById('linesCount');
        const wordsCountSpan = document.getElementById('wordsCount');
        const charsCountSpan = document.getElementById('charsCount');
        const syllablesCountSpan = document.getElementById('syllablesCount');
        const onlineCountSpan = document.getElementById('onlineCount');
        const collaboratorsList = document.getElementById('collaboratorsList');
        const lastSavedSpan = document.getElementById('lastSaved');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const exportTxtBtn = document.getElementById('exportTxtBtn');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userNameSpan = document.getElementById('userName');
        const userAvatar = document.getElementById('userAvatar');

        userNameSpan.textContent = userName;
        userAvatar.textContent = userName.charAt(0);

        let currentContent = editor.value;
        let history = [currentContent];
        let historyIndex = 0;
        let onlineUsers = new Map(); 
        let lastSaveTime = Date.now();

        const channel = new BroadcastChannel('poetry_collab');
        
        function broadcastContent(content) {
            channel.postMessage({
                type: 'content_update',
                userId: userId,
                userName: userName,
                userColor: userColor,
                content: content,
                timestamp: Date.now()
            });
            updateLastSaved();
        }

        function sendHeartbeat() {
            channel.postMessage({
                type: 'heartbeat',
                userId: userId,
                userName: userName,
                userColor: userColor,
                timestamp: Date.now()
            });
        }

        function sendCursorPosition(start, end) {
            channel.postMessage({
                type: 'cursor_move',
                userId: userId,
                userName: userName,
                userColor: userColor,
                start: start,
                end: end,
                timestamp: Date.now()
            });
        }

        channel.onmessage = (event) => {
            const data = event.data;
            
            switch (data.type) {
                case 'content_update':
                    if (data.userId !== userId) {
                        if (data.timestamp > lastSaveTime) {
                            currentContent = data.content;
                            editor.value = currentContent;
                            updateStats();
                            updateHistory(currentContent);
                            updateLastSaved();
                        }
                        addCollaborator(data.userId, data.userName, data.userColor);
                    }
                    break;
                    
                case 'heartbeat':
                    if (data.userId !== userId) {
                        addCollaborator(data.userId, data.userName, data.userColor);
                    }
                    break;
                    
                case 'cursor_move':
                    if (data.userId !== userId) {
                        showRemoteCursor(data.userId, data.userName, data.userColor, data.start);
                    }
                    break;
            }
        };

        function addCollaborator(uid, name, color) {
            onlineUsers.set(uid, { name, color, lastSeen: Date.now() });
            updateCollaboratorsList();
        }

        function updateCollaboratorsList() {
            collaboratorsList.innerHTML = '';
            const currentUserBadge = document.createElement('div');
            currentUserBadge.className = 'collaborator-badge';
            currentUserBadge.style.borderLeft = `3px solid ${userColor}`;
            currentUserBadge.innerHTML = `<span>📝 ${userName} (tú)</span>`;
            collaboratorsList.appendChild(currentUserBadge);
            
            onlineUsers.forEach((user, uid) => {
                const badge = document.createElement('div');
                badge.className = 'collaborator-badge';
                badge.style.borderLeft = `3px solid ${user.color}`;
                badge.innerHTML = `<span>✍️ ${user.name}</span>`;
                collaboratorsList.appendChild(badge);
            });
            
            const count = onlineUsers.size + 1;
            onlineCountSpan.textContent = `${count} conectado${count !== 1 ? 's' : ''}`;
        }

        let remoteCursors = new Map();

        function showRemoteCursor(uid, name, color, position) {
            if (remoteCursors.has(uid)) {
                remoteCursors.get(uid).remove();
            }
            
            const cursor = document.createElement('div');
            cursor.className = 'remote-cursor';
            cursor.style.backgroundColor = color;
            cursor.style.color = color;
            
            const label = document.createElement('span');
            label.className = 'remote-cursor-label';
            label.textContent = name;
            label.style.backgroundColor = color;
            cursor.appendChild(label);
            
            const textarea = editor;
            const textareaRect = textarea.getBoundingClientRect();
            
            const approxLine = Math.floor(position / 50) + 1;
            const approxRow = Math.floor(position % 50) + 1;
            
            cursor.style.position = 'absolute';
            cursor.style.left = `${textareaRect.left + approxRow * 8}px`;
            cursor.style.top = `${textareaRect.top + approxLine * 20}px`;
            
            document.body.appendChild(cursor);
            remoteCursors.set(uid, cursor);
            
            setTimeout(() => {
                if (remoteCursors.has(uid)) {
                    remoteCursors.get(uid).remove();
                    remoteCursors.delete(uid);
                }
            }, 2000);
        }

        function updateStats() {
            const text = editor.value;
            const lines = text.split(/\n/).filter(l => l.trim().length > 0);
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            const chars = text.replace(/\s/g, '').length;
            
            let syllables = 0;
            words.forEach(word => {
                const vowelCount = (word.match(/[aeiouáéíóú]/gi) || []).length;
                syllables += Math.max(1, vowelCount);
            });
            
            linesCountSpan.textContent = lines.length;
            wordsCountSpan.textContent = words.length;
            charsCountSpan.textContent = chars;
            syllablesCountSpan.textContent = syllables;
        }

        function updateHistory(newContent) {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(newContent);
            historyIndex = history.length - 1;
            
            if (history.length > 50) {
                history.shift();
                historyIndex--;
            }
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const prevContent = history[historyIndex];
                editor.value = prevContent;
                currentContent = prevContent;
                updateStats();
                broadcastContent(prevContent);
            } else {
                showToast('📜 No hay más cambios para deshacer');
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const nextContent = history[historyIndex];
                editor.value = nextContent;
                currentContent = nextContent;
                updateStats();
                broadcastContent(nextContent);
            } else {
                showToast('📜 No hay cambios para rehacer');
            }
        }

        function exportTxt() {
            const content = editor.value;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `poema_${new Date().toISOString().slice(0, 19)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📄 Poema exportado como TXT');
        }

        function exportJson() {
            const content = editor.value;
            const data = {
                titulo: "Poema colaborativo",
                contenido: content,
                autor: userName,
                fecha: new Date().toISOString(),
                estadisticas: {
                    versos: linesCountSpan.textContent,
                    palabras: wordsCountSpan.textContent,
                    caracteres: charsCountSpan.textContent,
                    silabas: syllablesCountSpan.textContent
                }
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `poema_${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📋 Poema exportado como JSON');
        }

        function setTheme(theme) {
            const themes = {
                dark: {
                    bg: '#0a0a1a',
                    text: '#e8dcc0',
                    border: 'rgba(255,255,255,0.15)'
                },
                sepia: {
                    bg: '#f4ecd8',
                    text: '#3a2a1a',
                    border: '#c9a87b'
                },
                forest: {
                    bg: '#1a3a2a',
                    text: '#c8e6d8',
                    border: '#6b9d3a'
                },
                ocean: {
                    bg: '#1a2a4a',
                    text: '#a8d0ff',
                    border: '#6ab0ff'
                }
            };
            
            const selected = themes[theme];
            if (selected) {
                editor.style.backgroundColor = selected.bg;
                editor.style.color = selected.text;
                editor.style.borderColor = selected.border;
                
                localStorage.setItem('editorTheme', theme);
                
                document.querySelectorAll('.theme-color').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.getAttribute('data-theme') === theme) {
                        btn.classList.add('active');
                    }
                });
            }
        }

        function clearEditor() {
            if (confirm('¿Seguro que quieres limpiar todo el poema? Esta acción no se puede deshacer fácilmente.')) {
                editor.value = '';
                currentContent = '';
                updateStats();
                updateHistory('');
                broadcastContent('');
                showToast('🗑️ Poema limpiado');
            }
        }

        function updateLastSaved() {
            lastSaveTime = Date.now();
            const time = new Date().toLocaleTimeString();
            lastSavedSpan.innerHTML = `Guardado ${time}`;
            setTimeout(() => {
                if (Date.now() - lastSaveTime < 2000) {
                    lastSavedSpan.innerHTML = `💾 Guardado`;
                }
            }, 2000);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function onEditorChange() {
            const newContent = editor.value;
            if (newContent !== currentContent) {
                currentContent = newContent;
                updateStats();
                updateHistory(newContent);
                broadcastContent(newContent);
            }
        }

        function onEditorKeyUp(e) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            sendCursorPosition(start, end);
        }

        setInterval(() => {
            sendHeartbeat();
            
            const now = Date.now();
            onlineUsers.forEach((user, uid) => {
                if (now - user.lastSeen > 10000) {
                    onlineUsers.delete(uid);
                }
            });
            updateCollaboratorsList();
        }, 3000);

        function init() {
            const initialPoem = `La luna me sonríe desde el cielo,
el viento trae susurros de otros tiempos.
En cada verso que nace de mi mano,
un mundo nuevo se abre, lejano.

Escribo para que las palabras vuelen,
para que el alma encuentre su consuelo.
La poesía es un puente entre los sueños,
un faro en medio del desvelo.`;
            
            editor.value = initialPoem;
            currentContent = initialPoem;
            updateStats();
            updateHistory(initialPoem);
            
            // eventos
            editor.addEventListener('input', onEditorChange);
            editor.addEventListener('keyup', onEditorKeyUp);
            editor.addEventListener('click', onEditorKeyUp);
            
            undoBtn.addEventListener('click', undo);
            redoBtn.addEventListener('click', redo);
            exportTxtBtn.addEventListener('click', exportTxt);
            exportJsonBtn.addEventListener('click', exportJson);
            clearBtn.addEventListener('click', clearEditor);
            
            // temas
            document.querySelectorAll('.theme-color').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.getAttribute('data-theme');
                    setTheme(theme);
                });
            });
            
            const savedTheme = localStorage.getItem('editorTheme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme('dark');
            }
            
            setTimeout(() => {
                sendHeartbeat();
                broadcastContent(currentContent);
            }, 500);
            
            showToast('Editor colaborativo listo. ¡Abre otra pestaña para colaborar!');
        }
